name: Tur138 Dependency Bridge

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Reconstruct exact Tur138 npm inputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/web
          cat > package.json <<'JSON'
          {
            "name": "isletme-ekosistemi",
            "private": true,
            "version": "1.0.0-rc.2",
            "workspaces": ["apps/*"],
            "scripts": {
              "dev": "npm --workspace @ecosystem/web run dev",
              "build": "npm --workspace @ecosystem/web run build",
              "check": "npm --workspace @ecosystem/web run check",
              "test": "npm --workspace @ecosystem/web run test"
            },
            "engines": {"node": ">=22"}
          }
          JSON
          cat > apps/web/package.json <<'JSON'
          {
            "name": "@ecosystem/web",
            "private": true,
            "version": "1.0.0-rc.2",
            "type": "module",
            "scripts": {
              "dev": "vite",
              "build": "tsc -b && vite build",
              "check": "tsc -b --pretty false",
              "test": "node --import tsx --test --test-concurrency=1 src/domain/__tests__/*.test.ts"
            },
            "dependencies": {
              "@radix-ui/react-dialog": "^1.1.20",
              "@radix-ui/react-tooltip": "^1.2.13",
              "@tanstack/react-table": "^8.21.3",
              "framer-motion": "^12.42.2",
              "lucide-react": "^1.25.0",
              "react": "^19.2.7",
              "react-dom": "^19.2.7"
            },
            "devDependencies": {
              "@playwright/test": "^1.61.1",
              "@types/node": "^26.1.1",
              "@types/react": "^19.2.14",
              "@types/react-dom": "^19.2.3",
              "@vitejs/plugin-react": "^6.0.3",
              "sass": "^1.101.0",
              "tsx": "^4.23.1",
              "typescript": "^7.0.2",
              "vite": "^8.1.5"
            }
          }
          JSON
          cat > /tmp/package-lock.json.gz.b64 <<'B64'
[...truncated...]