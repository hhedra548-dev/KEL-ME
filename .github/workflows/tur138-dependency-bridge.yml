name: Tur138 Dependency Bridge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm

      - name: Reconstruct Tur138 dependency manifest
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json
          rm -rf node_modules apps
          mkdir -p apps/web output
          cat > package.json <<'JSON'
          {
            "name": "isletme-ekosistemi",
            "private": true,
            "version": "1.0.0-rc.2",
            "workspaces": ["apps/*"],
            "scripts": {
              "dev": "npm --workspace @ecosystem/web run dev",
              "build": "npm --workspace @ecosystem/web run build",
              "check": "npm --workspace @ecosystem/web run check",
              "test": "npm --workspace @ecosystem/web run test"
            },
            "engines": {"node": ">=22"}
          }
          JSON
          cat > apps/web/package.json <<'JSON'
          {
            "name": "@ecosystem/web",
            "private": true,
            "version": "1.0.0-rc.2",
            "type": "module",
            "scripts": {
              "dev": "vite",
              "build": "tsc -b && vite build",
              "check": "tsc -b --pretty false",
              "test": "node --import tsx --test --test-concurrency=1 src/domain/__tests__/*.test.ts"
            },
            "dependencies": {
              "@radix-ui/react-dialog": "^1.1.20",
              "@radix-ui/react-tooltip": "^1.2.13",
              "@tanstack/react-table": "^8.21.3",
              "framer-motion": "^12.42.2",
              "lucide-react": "^1.25.0",
              "react": "^19.2.7",
              "react-dom": "^19.2.7"
            },
            "devDependencies": {
              "@playwright/test": "^1.61.1",
              "@types/node": "^26.1.1",
              "@types/react": "^19.2.14",
              "@types/react-dom": "^19.2.3",
              "@vitejs/plugin-react": "^6.0.3",
              "sass": "^1.101.0",
              "tsx": "^4.23.1",
              "typescript": "^7.0.2",
              "vite": "^8.1.5"
            }
          }
          JSON

      - name: Fresh npm resolution and clean install
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts
          cp package-lock.json output/generated-package-lock.json
          npm ci --ignore-scripts
          tar -czf output/node_modules.tar.gz node_modules
          sha256sum output/generated-package-lock.json output/node_modules.tar.gz > output/npm-artifacts.sha256

      - name: Build pglast dependency bundle
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --target output/pglast-site pglast
          tar -C output -czf output/pglast-site.tar.gz pglast-site
          rm -rf output/pglast-site
          sha256sum output/pglast-site.tar.gz > output/pglast-artifact.sha256

      - name: Fetch verified PostgreSQL 17.10 portable distribution
        shell: bash
        run: |
          set -euo pipefail
          url='https://github.com/theseus-rs/postgresql-binaries/releases/download/17.10.0/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz'
          curl -fL --retry 5 --retry-delay 2 "$url" -o output/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz
          echo '333937dac26a33d367810b0db20892bbca6cf244f670e26f54f3e0b57dcb50b6  output/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz' | sha256sum -c -
          sha256sum output/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz > output/postgresql-artifact.sha256

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: tur138-dependency-bridge
          path: output/
          retention-days: 1
          compression-level: 0
