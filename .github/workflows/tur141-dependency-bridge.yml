name: Tur141 Dependency Bridge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build exact Node dependency bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output apps/web
          cat > package.json <<'JSON'
          {"name":"tur141-bridge","private":true,"workspaces":["apps/*"]}
          JSON
          cat > apps/web/package.json <<'JSON'
          {
            "name":"@ecosystem/web","private":true,"version":"1.0.0-rc.2","type":"module",
            "dependencies":{"@radix-ui/react-dialog":"1.1.20","@radix-ui/react-tooltip":"1.2.13","@tanstack/react-table":"8.21.3","framer-motion":"12.42.2","lucide-react":"1.25.0","react":"19.2.7","react-dom":"19.2.7"},
            "devDependencies":{"@playwright/test":"1.61.1","@types/node":"26.1.1","@types/react":"19.2.17","@types/react-dom":"19.2.3","@vitejs/plugin-react":"6.0.3","sass":"1.101.0","tsx":"4.23.1","typescript":"7.0.2","vite":"8.1.5"}
          }
          JSON
          npm install --ignore-scripts
          tar -czf output/node_modules.tar.gz node_modules
          sha256sum output/node_modules.tar.gz > output/node_modules.tar.gz.sha256
      - name: Build Python 3.13 pglast bundle
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --target output/pglast-site 'pglast==8.2'
          python -c "import sys;sys.path.insert(0,'output/pglast-site');from pglast import parse_sql;assert parse_sql('select 1')"
          tar -C output -czf output/pglast-site.tar.gz pglast-site
          rm -rf output/pglast-site
          sha256sum output/pglast-site.tar.gz > output/pglast-site.tar.gz.sha256
      - name: Fetch verified PostgreSQL 17.10
        shell: bash
        run: |
          set -euo pipefail
          curl -fL --retry 5 --retry-delay 2 'https://github.com/theseus-rs/postgresql-binaries/releases/download/17.10.0/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz' -o output/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz
          echo '333937dac26a33d367810b0db20892bbca6cf244f670e26f54f3e0b57dcb50b6  output/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz' | sha256sum -c -
          sha256sum output/postgresql-17.10.0-x86_64-unknown-linux-gnu.tar.gz > output/postgresql.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: tur141-dependency-bridge
          path: output/
          retention-days: 1
          compression-level: 0
